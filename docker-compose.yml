services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zenvra
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zenvra-api:
    image: ghcr.io/cameroon-developer-network/zenvra-api:v0.1.1-rc.1
    build:
      context: .
      dockerfile: crates/server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/zenvra
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  zenvra-web:
    image: ghcr.io/cameroon-developer-network/zenvra-web:v0.1.1-rc.1
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PUBLIC_API_URL: http://localhost:8080
      # Internal URL for server-side fetches
      API_URL: http://zenvra-api:8080
    depends_on:
      - zenvra-api

volumes:
  postgres_data:
  redis_data:
